version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kuropanel-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kuropanel
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: kuropanel
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    networks:
      - kuropanel
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuropanel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kuropanel-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - kuropanel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: kuropanel-backend
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kuropanel
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: kuropanel
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:5000"
    networks:
      - kuropanel
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: kuropanel-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
      NEXT_PUBLIC_WS_URL: ws://backend:5000/ws
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - kuropanel
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:

networks:
  kuropanel:
    driver: bridge